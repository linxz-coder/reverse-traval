<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>反向旅游好选择</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #fff;
        --panel-2: #f8fafb;
        --field: #fbfcfe;
        --line: #d8e0ea;
        --line-soft: #e8edf3;
        --text: #141923;
        --muted: #66758a;
        --muted-2: #8793a5;
        --primary: #1657d8;
        --primary-dark: #0e43a8;
        --primary-soft: #edf4ff;
        --accent: #0f8b8d;
        --accent-soft: #e7f6f5;
        --good: #117a45;
        --good-bg: #e9f7ef;
        --warn: #9a5b00;
        --warn-bg: #fff4d7;
        --bad: #b42318;
        --bad-bg: #fff1f0;
        --shadow: 0 10px 24px rgba(21, 35, 54, 0.08);
        --shadow-soft: 0 1px 2px rgba(21, 35, 54, 0.06);
      }
      * { box-sizing: border-box; }
      * { min-width: 0; }
      body {
        margin: 0;
        overflow-x: hidden;
        background:
          linear-gradient(180deg, #eaf1f9 0, #f8fafc 230px, var(--bg) 100%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
      }
      a:hover { text-decoration: underline; }
      .contact-author {
        display: flex;
        align-items: center;
        gap: 7px;
        max-width: calc(100vw - 32px);
        padding: 8px 10px;
        border: 1px solid rgba(22, 87, 216, 0.16);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        color: var(--muted);
        font-size: 12px;
        line-height: 1.2;
        box-shadow: var(--shadow-soft);
        backdrop-filter: blur(10px);
      }
      .top-actions {
        display: flex;
        align-items: flex-end;
        flex-direction: column;
        gap: 8px;
        flex: 0 0 auto;
      }
      .contact-author strong {
        color: var(--primary);
        font-weight: 700;
        overflow-wrap: anywhere;
      }
      .page {
        width: min(1280px, 100%);
        margin: 0 auto;
        padding: 24px 18px 48px;
      }
      .topbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }
      .title-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand-mark {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background:
          linear-gradient(135deg, var(--primary) 0 48%, var(--accent) 48% 100%);
        box-shadow: 0 7px 18px rgba(22, 87, 216, 0.18);
        flex: 0 0 auto;
      }
      h1 {
        margin: 0;
        font-size: 29px;
        line-height: 1.2;
        letter-spacing: 0;
      }
      .sub {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }
      .health {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #466273;
        font-size: 13px;
        white-space: nowrap;
        height: 34px;
        padding: 0 12px;
        border: 1px solid rgba(15, 139, 141, 0.2);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: var(--shadow-soft);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--good);
        box-shadow: 0 0 0 4px rgba(17, 122, 69, 0.12);
      }
      .toolbar, .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }
      .toolbar {
        display: grid;
        grid-template-columns: minmax(130px, 0.9fr) minmax(250px, 1.5fr) repeat(5, minmax(118px, 0.75fr)) auto;
        gap: 12px;
        padding: 16px;
        align-items: end;
        position: relative;
      }
      .toolbar::before,
      .nearby-toolbar::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 3px;
        background: var(--primary);
        border-radius: 8px 0 0 8px;
      }
      .nearby-toolbar {
        margin-top: 12px;
        display: grid;
        grid-template-columns: minmax(180px, 0.9fr) minmax(150px, 0.8fr) auto auto minmax(220px, 1.5fr);
        gap: 12px;
        align-items: end;
        padding: 14px 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        position: relative;
      }
      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }
      input, select, button {
        width: 100%;
        height: 42px;
        border-radius: 8px;
        border: 1px solid var(--line);
        padding: 0 12px;
        background: var(--field);
        color: var(--text);
        font-size: 14px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.72);
      }
      input:hover, select:hover {
        border-color: #c2ccd9;
        background: #fff;
      }
      input:focus, select:focus {
        outline: 3px solid rgba(22, 87, 216, 0.12);
        border-color: var(--primary);
        background: #fff;
      }
      .cache-option {
        grid-column: span 2;
        min-height: 42px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(180deg, #ffffff, var(--panel-2));
        color: var(--text);
        cursor: pointer;
        box-shadow: var(--shadow-soft);
      }
      .cache-option:hover {
        border-color: #c2ccd9;
      }
      .cache-option input[type="checkbox"] {
        width: 18px;
        height: 18px;
        padding: 0;
        margin: 0;
        accent-color: var(--primary);
        flex: 0 0 auto;
      }
      .cache-option strong {
        display: block;
        font-size: 13px;
        line-height: 1.25;
      }
      .cache-option small {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 500;
        line-height: 1.35;
      }
      button {
        border: 0;
        background: linear-gradient(180deg, #1b63e7, var(--primary));
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        padding: 0 18px;
        min-width: 116px;
        box-shadow: 0 8px 18px rgba(22, 87, 216, 0.18);
      }
      button:hover { background: linear-gradient(180deg, #1659d2, var(--primary-dark)); }
      button:disabled { opacity: 0.76; cursor: wait; }
      .secondary-btn {
        border: 1px solid var(--line);
        background: #fff;
        color: #405066;
        box-shadow: var(--shadow-soft);
      }
      .secondary-btn:hover {
        background: #f3f6fb;
        color: var(--primary);
      }
      .nearby-hint {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        align-self: center;
      }
      .nearby-hint:empty { display: none; }
      .spinner {
        display: none;
        width: 14px;
        height: 14px;
        margin-right: 8px;
        border: 2px solid rgba(255,255,255,0.42);
        border-top-color: #fff;
        border-radius: 999px;
        vertical-align: -2px;
        animation: spin 0.8s linear infinite;
      }
      button.loading .spinner { display: inline-block; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .notice {
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border: 1px solid #dce6ef;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--muted);
        font-size: 13px;
        box-shadow: var(--shadow-soft);
      }
      .quickbar {
        margin-top: 10px;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .chip-btn, .seg-btn {
        width: auto;
        height: 32px;
        min-width: 0;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.9);
        color: #405066;
        padding: 0 10px;
        font-size: 13px;
        font-weight: 700;
        box-shadow: var(--shadow-soft);
      }
      .chip-btn:hover, .seg-btn:hover {
        background: #f3f6fb;
        color: var(--primary);
      }
      .chip-btn.active, .seg-btn.active {
        border-color: var(--primary);
        background: var(--primary-soft);
        color: var(--primary);
      }
      .status {
        margin-top: 12px;
        border: 1px solid #b8cdfa;
        background: #eef4ff;
        color: #214784;
        border-radius: 8px;
        padding: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 14px;
      }
      .progress-panel {
        margin-top: 10px;
        padding: 12px;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: var(--shadow-soft);
      }
      .progress-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
        color: #36445a;
        font-size: 13px;
        font-weight: 800;
      }
      .progress-meta {
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }
      .progress-list {
        display: grid;
        gap: 6px;
      }
      .progress-item {
        display: grid;
        grid-template-columns: 9px minmax(0, 1fr);
        gap: 8px;
        align-items: start;
        color: #43536a;
        font-size: 12px;
        line-height: 1.45;
      }
      .progress-item::before {
        content: "";
        width: 7px;
        height: 7px;
        margin-top: 5px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 139, 141, 0.1);
      }
      .error {
        margin-top: 12px;
        color: var(--bad);
        background: var(--bad-bg);
        border: 1px solid #ffd0cc;
        border-radius: 8px;
        padding: 12px;
        font-size: 14px;
      }
      .hidden { display: none !important; }
      .result {
        margin-top: 18px;
        display: grid;
        gap: 14px;
      }
      .panel { overflow: hidden; }
      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1px;
        background: var(--line-soft);
      }
      .stat {
        background: var(--panel);
        padding: 15px;
        min-height: 76px;
      }
      .stat .k {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 6px;
        font-weight: 600;
      }
      .stat .v {
        font-size: 20px;
        font-weight: 800;
        line-height: 1.25;
      }
      .area-panel {
        padding: 14px;
      }
      .section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .section-title {
        margin: 0;
        font-size: 16px;
      }
      .section-meta {
        color: var(--muted);
        font-size: 13px;
      }
      .area-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }
      .area-card {
        border: 1px solid #dfe6ee;
        border-radius: 8px;
        background: linear-gradient(180deg, #fff, #fbfcfe);
        padding: 12px;
        box-shadow: var(--shadow-soft);
        cursor: pointer;
        text-align: left;
        transition: border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
      }
      .area-card:hover,
      .area-card:focus {
        border-color: rgba(22, 87, 216, 0.45);
        box-shadow: 0 8px 18px rgba(22, 87, 216, 0.12);
        outline: none;
        transform: translateY(-1px);
      }
      .area-card.active {
        border-color: var(--primary);
        background: linear-gradient(180deg, #f7fbff, #edf4ff);
        box-shadow: 0 0 0 3px rgba(22, 87, 216, 0.12), var(--shadow-soft);
      }
      .area-more-card {
        min-height: 128px;
        display: grid;
        place-items: center;
        gap: 6px;
        background: linear-gradient(180deg, #f7fbff, #edf4ff);
        border-style: dashed;
        color: var(--primary);
      }
      .area-more-dots {
        font-size: 30px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0;
      }
      .area-more-text {
        color: #405066;
        font-size: 12px;
        font-weight: 800;
        text-align: center;
      }
      .area-name {
        font-size: 16px;
        font-weight: 800;
        margin-bottom: 8px;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }
      .area-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 8px;
      }
      .area-hotels {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }
      .table-head {
        display: grid;
        gap: 10px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line-soft);
        background: linear-gradient(180deg, #fbfcfe, #f5f8fb);
      }
      .table-head-main {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }
      .table-title {
        flex: 0 0 auto;
        margin: 0;
        font-size: 15px;
      }
      .table-tools {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: space-between;
      }
      .result-search {
        width: min(430px, 100%);
        display: flex;
        align-items: center;
        gap: 9px;
        min-height: 38px;
        padding: 3px 4px 3px 11px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow-soft);
      }
      .result-search:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(22, 87, 216, 0.1);
      }
      .result-search span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }
      .result-search input {
        flex: 1 1 auto;
        height: 34px;
        min-width: 0;
        border: 0;
        border-radius: 6px;
        background: transparent;
        box-shadow: none;
        padding: 0 8px;
      }
      .result-search input:hover,
      .result-search input:focus {
        outline: 0;
        background: #fff;
      }
      .table-meta {
        color: var(--muted);
        font-size: 13px;
      }
      .segmented {
        display: inline-flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .table-wrap { overflow-x: auto; }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 920px;
      }
      th, td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line-soft);
        text-align: left;
        vertical-align: top;
        font-size: 14px;
      }
      th {
        color: var(--muted);
        background: #f8fafc;
        font-size: 12px;
        font-weight: 700;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      tbody tr:hover { background: #fbfdff; }
      .hotel-name {
        font-weight: 800;
        margin-bottom: 5px;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }
      .muted {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
      }
      .price-main {
        font-size: 18px;
        font-weight: 800;
        line-height: 1.25;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        height: 24px;
        padding: 0 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        background: #eef3f7;
        color: #415064;
        margin: 3px 6px 3px 0;
        max-width: 100%;
      }
      .diff {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 84px;
        height: 30px;
        padding: 0 10px;
        border-radius: 999px;
        font-weight: 800;
        white-space: nowrap;
      }
      .diff.good { background: var(--good-bg); color: var(--good); }
      .diff.warn { background: var(--warn-bg); color: var(--warn); }
      .diff.bad { background: var(--bad-bg); color: var(--bad); }
      .empty {
        padding: 24px 14px;
        color: var(--muted);
        text-align: center;
      }
      @media (max-width: 1040px) {
        .toolbar { grid-template-columns: 1fr 1fr; }
        .nearby-toolbar { grid-template-columns: 1fr 1fr; }
        button { min-width: 0; }
        .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .area-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 720px) {
        body {
          background: #f4f6f9;
        }
        .page {
          padding: 14px 10px 28px;
        }
        .topbar { display: block; }
        .top-actions {
          align-items: stretch;
          margin-top: 10px;
        }
        .health {
          white-space: normal;
        }
        h1 { font-size: 23px; }
        .sub {
          font-size: 13px;
          line-height: 1.45;
        }
        .toolbar {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px;
          padding: 12px;
        }
        .toolbar > label:nth-of-type(1),
        .toolbar > label:nth-of-type(2),
        .toolbar > label:nth-of-type(7),
        .toolbar > .cache-option,
        .toolbar > button {
          grid-column: 1 / -1;
        }
        .nearby-toolbar {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px;
          padding: 12px;
        }
        .nearby-toolbar > label,
        .nearby-toolbar > .nearby-hint {
          grid-column: 1 / -1;
        }
        .summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .area-grid { grid-template-columns: 1fr; }
        label { gap: 6px; }
        input, select, button {
          height: 40px;
          padding: 0 10px;
          font-size: 16px;
        }
        .cache-option {
          min-height: 0;
          padding: 10px;
        }
        .cache-option small {
          font-size: 11px;
        }
        .quickbar {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 8px;
        }
        .chip-btn {
          width: 100%;
          height: 36px;
        }
        .notice {
          line-height: 1.45;
        }
        .stat {
          padding: 12px;
          min-height: 70px;
        }
        .stat .v {
          font-size: 17px;
          overflow-wrap: anywhere;
        }
        .notice, .status, .table-head, .table-tools, .section-head {
          align-items: flex-start;
          flex-direction: column;
        }
        .table-head-main {
          width: 100%;
          align-items: flex-start;
          flex-direction: column;
          gap: 9px;
        }
        .table-head {
          gap: 10px;
          padding: 12px;
        }
        .table-tools,
        .segmented {
          width: 100%;
        }
        .result-search { width: 100%; }
        .segmented {
          display: grid;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 6px;
        }
        .seg-btn {
          width: 100%;
          height: 34px;
          padding: 0 6px;
          font-size: 12px;
        }
        .table-meta {
          line-height: 1.45;
        }
        .contact-author {
          width: fit-content;
          margin-left: auto;
          padding: 7px 10px;
          font-size: 11px;
        }
        .table-wrap { overflow: visible; }
        table {
          min-width: 0;
          display: block;
        }
        thead { display: none; }
        tbody {
          display: grid;
          gap: 10px;
          padding: 10px;
        }
        tr, td {
          display: block;
          width: 100%;
        }
        tr {
          border: 1px solid var(--line-soft);
          border-radius: 8px;
          background: #fff;
          overflow: hidden;
        }
        td {
          border-bottom: 1px solid var(--line-soft);
          padding: 10px 12px;
        }
        td:last-child {
          border-bottom: 0;
        }
        td::before {
          content: attr(data-label);
          display: block;
          color: var(--muted);
          font-size: 12px;
          font-weight: 700;
          margin-bottom: 4px;
        }
        .price-main {
          font-size: 17px;
        }
        .diff {
          min-width: 0;
          height: 28px;
        }
        .pill {
          height: auto;
          min-height: 24px;
          padding-top: 4px;
          padding-bottom: 4px;
          line-height: 1.25;
          white-space: normal;
        }
        .empty {
          border: 0;
          padding: 20px 10px;
        }
        tr:has(.empty) {
          border: 0;
        }
      }
      @media (max-width: 340px) {
        .page {
          padding-left: 8px;
          padding-right: 8px;
        }
        .toolbar,
        .nearby-toolbar,
        .summary,
        .quickbar {
          grid-template-columns: 1fr;
        }
        .segmented {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <div class="title-row">
            <span class="brand-mark" aria-hidden="true"></span>
            <h1>反向旅游好选择</h1>
          </div>

        <div class="top-actions">

      </header>

      <form class="toolbar" id="search-form">
        <label>

          <input name="city" value="深圳" placeholder="例如：深圳" required />

        <label>

      <section class="result hidden" id="result">
        <div class="panel summary" id="summary"></div>
        <div class="panel area-panel">
          <div class="section-head">
            <h2 class="section-title">推荐旅游区域</h2>
            <div class="section-meta" id="area-meta"></div>
          </div>
          <div class="area-grid" id="area-recommendations"></div>
        </div>
        <div class="panel">
          <div class="table-head">
            <div class="table-head-main">
              <h2 class="table-title">反向旅游好选择</h2>
              <label class="result-search">
                <span>酒店搜索</span>
                <input id="result-search" type="search" placeholder="搜索酒店名或片区" autocomplete="off" />

              <div class="segmented" id="view-filter" aria-label="结果筛选">
                <button class="seg-btn active" type="button" data-view="all">全部</button>
                <button class="seg-btn" type="button" data-view="lower">假期更低</button>
                <button class="seg-btn" type="button" data-view="slight">略高可接受</button>

            </div>

            <table>
              <thead>
                <tr>
                  <th>酒店</th>
                  <th>假期每晚含税</th>
                  <th>代表时段每晚含税</th>
                  <th>每晚差额</th>
                </tr>

    </main>

    <script>
      const holidaySelect = document.getElementById("holiday-select");
      const form = document.getElementById("search-form");
      const nearbyForm = document.getElementById("nearby-form");
      const submitBtn = document.getElementById("submit-btn");
      const submitText = document.getElementById("submit-text");
      const nearbySubmitBtn = document.getElementById("nearby-submit-btn");
      const nearbySubmitText = document.getElementById("nearby-submit-text");
      const geoBtn = document.getElementById("geo-btn");
      const originProvince = document.getElementById("origin-province");
      const originCity = document.getElementById("origin-city");
      const nearbyHint = document.getElementById("nearby-hint");
      const errorBox = document.getElementById("error-box");
      const statusBox = document.getElementById("status-box");
      const statusText = document.getElementById("status-text");
      const elapsed = document.getElementById("elapsed");
      const progressPanel = document.getElementById("progress-panel");
      const progressList = document.getElementById("progress-list");
      const progressMeta = document.getElementById("progress-meta");
      const result = document.getElementById("result");
      const summary = document.getElementById("summary");
      const areaRecommendations = document.getElementById("area-recommendations");
      const areaMeta = document.getElementById("area-meta");
      const tableMeta = document.getElementById("table-meta");
      const choicesBody = document.getElementById("choices-body");
      const viewFilter = document.getElementById("view-filter");
      const resultSearchInput = document.getElementById("result-search");
      const useCacheInput = document.getElementById("use-cache");
      const priceButtons = Array.from(document.querySelectorAll("[data-price-range]"));
      let timer = null;
      let startedAt = 0;
      let lastChoices = [];
      let lastServerAreas = [];
      let lastComparisonCount = 0;
      let lastQuerySeconds = 0;
      let lastCacheInfo = null;
      let lastProgressMessage = "";
      let lastAreaRefreshMeta = "";
      let lastResultMeta = "";
      let lastHotelNameMeta = "";
      let lastTotalChoiceCount = 0;
      let areaRefreshToken = 0;
      let hotelNameRefreshToken = 0;
      let coverageRefreshToken = 0;
      let currentUseCache = true;
      let currentRequestKind = "single";
      let activeView = "all";
      let resultSearchQuery = "";
      let activeAreaFilter = null;
      let areaListExpanded = false;
      const AREA_COLLAPSED_LIMIT = 8;
      const provinceCityOptions = {{ province_city_options|tojson }};

      function esc(text) {
        return String(text || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      const t2sPhrases = [
        ["希爾頓花園酒店", "希尔顿花园酒店"],
        ["洲際酒店", "洲际酒店"],
        ["凱悅酒店", "凯悦酒店"],
        ["格蘭雲天", "格兰云天"],
        ["維也納酒店", "维也纳酒店"],
        ["深圳國際會展中心", "深圳国际会展中心"],
        ["光明虹橋", "光明虹桥"],
      ];
      const t2sChars = {
        "廣": "广", "東": "东", "門": "门", "雲": "云", "國": "国", "際": "际", "會": "会",
        "灣": "湾", "橋": "桥", "園": "园", "華": "华", "凱": "凯", "悅": "悦", "爾": "尔",
        "頓": "顿", "維": "维", "納": "纳", "蘭": "兰", "瀾": "澜", "麗": "丽", "濱": "滨",
        "樓": "楼", "閣": "阁", "館": "馆", "莊": "庄", "龍": "龙", "寧": "宁", "蘇": "苏",
        "縣": "县", "區": "区", "內": "内", "陽": "阳", "長": "长", "慶": "庆", "達": "达",
        "連": "连", "濟": "济", "鄭": "郑", "漢": "汉", "貴": "贵", "樂": "乐", "兒": "儿",
        "親": "亲", "雙": "双", "張": "张", "萬": "万", "與": "与", "裏": "里", "裡": "里",
        "臺": "台", "島": "岛", "飯": "饭", "體": "体", "號": "号", "潔": "洁", "寶": "宝",
        "緣": "缘", "錦": "锦", "匯": "汇", "恆": "恒", "榮": "荣", "業": "业", "廈": "厦",
        "廳": "厅", "營": "营", "適": "适", "選": "选", "鄰": "邻", "韓": "韩", "歐": "欧",
        "羅": "罗", "倫": "伦", "紐": "纽", "舊": "旧", "聖": "圣", "鬆": "松", "豐": "丰",
        "齋": "斋", "齊": "齐", "淺": "浅", "澀": "涩", "環": "环", "購": "购", "碼": "码",
        "櫚": "榈", "壯": "壮", "劇": "剧", "鐵": "铁", "盧": "卢", "奧": "奥", "馬": "马"
      };

      function simplifyChineseText(text) {
        let value = String(text || "");
        for (const [from, to] of t2sPhrases) value = value.split(from).join(to);
        return Array.from(value).map((char) => t2sChars[char] || char).join("");
      }

      function normalizeSearchText(text) {
        return simplifyChineseText(text)
          .toLowerCase()
          .replace(/[\s\-_,.()（）·•|｜\/\\:："'“”‘’]+/g, "");
      }

      function choiceSearchText(item) {
        const aliases = Array.isArray(item.hotel_name_aliases) ? item.hotel_name_aliases : [];
        return normalizeSearchText([
          item.hotel_name,
          item.hotel_original_name,
          item.hotel_name_simplified,
          item.hotel_search_name,
          item.area_name,
          item.area_hint,
          item.recommend_city,
          ...aliases,
        ].filter(Boolean).join(" "));
      }

      function choiceKey(item, index) {
        const hotelId = item && item.hotel_id ? String(item.hotel_id) : "";
        const roomType = item && item.room_type ? String(item.room_type) : "";
        const city = item && item.recommend_city ? String(item.recommend_city) : "";
        if (hotelId) return `${city}:${hotelId}:${roomType}`;
        if (item && item.detail_url) return `${city}:${item.detail_url}:${roomType}`;
        return `${city}:${index}`;
      }

      function mergeChoiceUpdates(updatedChoices, fields = null) {
        if (!Array.isArray(updatedChoices) || !updatedChoices.length) return;
        const byKey = new Map(lastChoices.map((item, index) => [choiceKey(item, index), item]));
        updatedChoices.forEach((updated, index) => {
          const key = choiceKey(updated, index);
          const existing = byKey.get(key);
          if (!existing && Array.isArray(fields)) return;
          if (!existing) {
            const appended = { ...updated };
            lastChoices.push(appended);
            byKey.set(key, appended);
            return;
          }
          if (Array.isArray(fields)) {
            fields.forEach((field) => {
              if (Object.prototype.hasOwnProperty.call(updated, field)) existing[field] = updated[field];
            });
          } else {
            Object.assign(existing, updated);
          }
        });
      }

      function initOriginCitySelector() {
        originProvince.innerHTML = provinceCityOptions.map((item) =>
          `<option value="${esc(item.province)}">${esc(item.province)}</option>`
        ).join("");
        setOriginCity("深圳");
        originProvince.addEventListener("change", () => {
          populateOriginCities(originProvince.value);
        });
      }

      function populateOriginCities(province, selectedCity = "") {
        const provinceItem = provinceCityOptions.find((item) => item.province === province) || provinceCityOptions[0];
        const cities = provinceItem ? provinceItem.cities : [];
        originCity.innerHTML = cities.map((city) =>
          `<option value="${esc(city)}">${esc(city)}</option>`
        ).join("");
        const nextCity = cities.includes(selectedCity) ? selectedCity : (cities[0] || "");
        if (nextCity) originCity.value = nextCity;
      }

      function setOriginCity(city) {
        const normalizedCity = String(city || "").trim();
        const provinceItem = provinceCityOptions.find((item) => (item.cities || []).includes(normalizedCity));
        const fallbackProvince = provinceCityOptions.find((item) => item.province === "广东") || provinceCityOptions[0];
        const nextProvince = provinceItem || fallbackProvince;
        if (!nextProvince) return;
        originProvince.value = nextProvince.province;
        populateOriginCities(nextProvince.province, provinceItem ? normalizedCity : "深圳");
      }

      function setLoading(active) {
        submitBtn.disabled = active;
        nearbySubmitBtn.disabled = active;
        geoBtn.disabled = active;
        submitBtn.classList.toggle("loading", active && currentRequestKind === "single");
        nearbySubmitBtn.classList.toggle("loading", active && currentRequestKind === "nearby");
        submitText.textContent = active && currentRequestKind === "single" ? "筛选中" : "开始筛选";
        nearbySubmitText.textContent = active && currentRequestKind === "nearby" ? "推荐中" : "按所在城市推荐";
        statusBox.classList.toggle("hidden", !active);
        if (!active) {
          window.clearInterval(timer);
          timer = null;
          return;
        }
        startedAt = Date.now();
        lastProgressMessage = "";
        progressList.innerHTML = "";
        progressMeta.textContent = "";
        progressPanel.classList.remove("hidden");
        statusText.textContent = loadingMessage(0);
        updateElapsed();
        timer = window.setInterval(updateElapsed, 1000);
      }

      function loadingMessage(seconds) {
        if (currentRequestKind === "nearby") {
          if (currentUseCache) {
            return "正在读取附近城市缓存；没有缓存会自动逐城新搜索。";
          }
          return seconds > 45 ? "正在逐城比较附近城市价格，可能需要 5-15 分钟..." : "正在逐城新搜索附近城市，可能需要 5-15 分钟...";
        }
        if (currentUseCache) {
          return "正在读取缓存；如未命中会自动新搜索。";
        }
        return seconds > 45 ? "正在比较多个代表日期的含税均价..." : "正在进行新搜索，通常需要 2-5 分钟...";
      }

      function updateElapsed() {
        const seconds = Math.max(0, Math.floor((Date.now() - startedAt) / 1000));
        const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
        const ss = String(seconds % 60).padStart(2, "0");
        elapsed.textContent = `${mm}:${ss}`;
        statusText.textContent = lastProgressMessage || loadingMessage(seconds);
        if (seconds > 120 && !lastProgressMessage) {
          statusText.textContent = "正在补全酒店中文名和整理结果...";
        }
      }

      function diffClass(value) {
        const n = Number(value || 0);
        if (n <= 0) return "good";
        if (n <= 100) return "warn";
        return "bad";
      }

      function renderSummary(data) {
        const areaCount = mergeAreaLists(
          data.area_recommendations || [],
          buildAreasFromChoices(data.choices || [])
        ).length;
        if (data.origin_city) {
          summary.innerHTML = `
            <div class="stat"><div class="k">按所在城市推荐</div><div class="v">${esc(data.origin_city)}</div></div>
            <div class="stat"><div class="k">附近城市</div><div class="v">${esc((data.nearby_cities || []).join("、"))}</div></div>
            <div class="stat"><div class="k">命中酒店</div><div class="v">${esc((data.choices || []).length)} 家</div></div>
            <div class="stat"><div class="k">推荐区域</div><div class="v">${esc(areaCount)} 个</div></div>
          `;
        } else {
          summary.innerHTML = `
            <div class="stat"><div class="k">城市</div><div class="v">${esc(data.city)}</div></div>
            <div class="stat"><div class="k">假期</div><div class="v">${esc(data.holiday.name)}</div></div>
            <div class="stat"><div class="k">入住时段</div><div class="v">${esc(data.holiday.check_in)} 至 ${esc(data.holiday.check_out)}</div></div>
            <div class="stat"><div class="k">推荐区域</div><div class="v">${esc(areaCount)} 个</div></div>
          `;
        }
        lastComparisonCount = (data.comparison_windows || []).length;
      }

      function areaFilterKey(areaName, recommendCity = "") {
        return `${normalizeSearchText(areaName)}::${normalizeSearchText(recommendCity)}`;
      }

      function matchesActiveArea(item) {
        if (!activeAreaFilter) return true;
        const itemArea = normalizeSearchText(item.area_name || "");
        const itemCity = normalizeSearchText(item.recommend_city || "");
        return itemArea === activeAreaFilter.area && (!activeAreaFilter.city || itemCity === activeAreaFilter.city);
      }

      function visibleChoices(options = {}) {
        let items = lastChoices;
        if (activeView === "lower") {
          items = items.filter((item) => Number(item.price_diff_nightly || 0) <= 0);
        } else if (activeView === "slight") {
          items = items.filter((item) => {
            const diff = Number(item.price_diff_nightly || 0);
            return diff > 0 && diff <= 100;
          });
        }
        if (resultSearchQuery) {
          items = items.filter((item) => choiceSearchText(item).includes(resultSearchQuery));
        }
        if (!options.ignoreAreaFilter) {
          items = items.filter(matchesActiveArea);
        }
        return items;
      }

      function renderChoices() {
        const items = visibleChoices();
        const cacheText = formatCacheInfo(lastCacheInfo);
        const searchText = resultSearchQuery && resultSearchInput.value.trim()
          ? `，搜索「${resultSearchInput.value.trim()}」`
          : "";
        const areaText = activeAreaFilter ? `，片区「${activeAreaFilter.label}」` : "";
        const stageText = [lastResultMeta, lastHotelNameMeta].filter(Boolean).join("，");
        const totalChoiceCount = Math.max(lastTotalChoiceCount || 0, lastChoices.length);
        const countText = totalChoiceCount > lastChoices.length
          ? `${items.length}/${lastChoices.length} 家（已找到 ${totalChoiceCount} 家，逐步显示）`
          : `${items.length}/${lastChoices.length} 家`;
        tableMeta.textContent = `${countText}，${lastComparisonCount} 个代表时段，本次 ${formatDuration(lastQuerySeconds)}${cacheText ? `，${cacheText}` : ""}${stageText ? `，${stageText}` : ""}${areaText}${searchText}`;
        renderAreas(visibleChoices({ ignoreAreaFilter: true }));
        if (!items.length) {
          choicesBody.innerHTML = `<tr><td class="empty" colspan="4">${activeAreaFilter ? "该片区下没有匹配当前筛选的酒店。" : (resultSearchQuery ? "结果里没有匹配的酒店。" : "当前条件下没有找到“反向旅游好选择”。")}</td></tr>`;
          return;
        }
        choicesBody.innerHTML = items.map((item) => `
          <tr>
            <td data-label="酒店">
              <div class="hotel-name">${esc(item.hotel_name)}</div>
              ${item.hotel_original_name && item.hotel_original_name !== item.hotel_name ? `<div class="muted">原名：${esc(item.hotel_original_name)}</div>` : ""}
              <div>
                <span class="pill">${esc(item.room_type_label)}</span>
                ${item.recommend_city ? `<span class="pill">${esc(item.recommend_city)}</span>` : ""}
                ${item.area_name ? `<span class="pill">${esc(item.area_name)}</span>` : ""}
                ${item.hotel_name_source ? `<span class="pill">${esc(item.hotel_name_source)}</span>` : ""}
              </div>
              <div class="muted">${esc(item.holiday_room_name)}</div>
              <div><a href="${esc(item.detail_url)}" target="_blank" rel="noreferrer">打开 Trip.com 详情</a></div>
            </td>
            <td data-label="假期每晚含税">
              <div class="price-main">${esc(item.holiday_avg_nightly_tax_total_price)}</div>
              <div class="muted">房价参考：${esc(item.holiday_room_price)}</div>
              <div class="muted">整段含税：${esc(item.holiday_tax_total_price)}</div>
            </td>
            <td data-label="代表时段每晚含税">
              <div class="price-main">${esc(item.comparison_average_nightly_tax_total_price)}</div>
              <div class="muted">样本数：${esc(item.comparison_sample_count)}</div>
              <div class="muted">最低样本：${esc(item.comparison_lowest_nightly_tax_total_price)}</div>
              <div class="muted">${esc(item.comparison_lowest_check_in)} 至 ${esc(item.comparison_lowest_check_out)}</div>
            </td>
            <td data-label="每晚差额">
              <span class="diff ${diffClass(item.price_diff_nightly)}">${esc(item.price_diff_nightly_text)}</span>
            </td>
          </tr>
        `).join("");
      }

      function resetViewMode() {
        activeView = "all";
        resultSearchQuery = "";
        activeAreaFilter = null;
        areaListExpanded = false;
        if (resultSearchInput) resultSearchInput.value = "";
        viewFilter.querySelectorAll("[data-view]").forEach((button) => {
          button.classList.toggle("active", button.dataset.view === activeView);
        });
      }

      function applyResultData(data, options = {}) {
        lastQuerySeconds = Math.max(0, Math.round((Date.now() - startedAt) / 1000));
        lastChoices = data.choices || [];
        lastServerAreas = data.area_recommendations || [];
        lastCacheInfo = data.cache || null;
        lastTotalChoiceCount = Number(data.partial?.total_choice_count || lastChoices.length || 0);
        lastResultMeta = data.partial?.preliminary
          ? (data.partial.message || "酒店在逐步显示中，最终结果会继续刷新")
          : "";
        lastAreaRefreshMeta = "";
        renderSummary(data);
        renderChoices();
        result.classList.remove("hidden");
        if (options.refreshHotelNames !== false) {
          startHotelNameRefresh(data);
        }
        if (options.refreshAreas !== false) {
          startAreaRefresh(data);
        }
        if (options.refreshCoverage !== false) {
          startCoverageRefresh(data);
        }
      }

      function coveragePayloadFromResult(data) {
        const filters = data.feature_filters || {};
        const priceFilter = data.price_filter || {};
        return {
          city: data.city || "",
          holiday_code: data.holiday?.code || "",
          min_price: priceFilter.min_price ?? "",
          max_price: priceFilter.max_price ?? "",
          advanced_filter: filters.advanced?.value || "all",
          pool_filter: filters.pool?.value || "all",
          child_facility_filter: filters.child_facility?.value || "all",
          choices: data.choices || [],
        };
      }

      function mergeCoverageResult(data, token) {
        if (token !== coverageRefreshToken || !data) return;
        mergeChoiceUpdates(data.choices || []);
        lastChoices.sort((a, b) =>
          Number(a.price_diff_nightly || 0) - Number(b.price_diff_nightly || 0)
          || Number(a.holiday_avg_nightly_tax_total_value || 0) - Number(b.holiday_avg_nightly_tax_total_value || 0)
        );
        lastServerAreas = data.area_recommendations || lastServerAreas;
        lastTotalChoiceCount = Math.max(lastTotalChoiceCount || 0, lastChoices.length);
        const supplement = data.coverage_supplement || {};
        if (supplement.message) lastResultMeta = supplement.message;
        renderSummary({ ...data, choices: lastChoices, area_recommendations: lastServerAreas });
        renderChoices();
      }

      function startCoverageRefresh(data) {
        if (!data || !(data.choices || []).length || data.city_results) return;
        const payload = coveragePayloadFromResult(data);
        if (!payload.city || !payload.holiday_code) return;
        const token = ++coverageRefreshToken;
        lastResultMeta = "基础结果已显示，正在后台按行政区补充遗漏酒店...";
        renderChoices();
        runAsyncJob("/api/coverage/start", payload, "行政区补充失败", {
          onProgress: (partial) => mergeCoverageResult(partial, token),
        }).then((coverageData) => {
          mergeCoverageResult(coverageData, token);
        }).catch(() => {
          if (token !== coverageRefreshToken) return;
          lastResultMeta = "";
          renderChoices();
        });
      }

      function startAreaRefresh(data) {
        if (!data || !(data.choices || []).length) return;
        const token = ++areaRefreshToken;
        lastAreaRefreshMeta = "酒店结果已显示，正在后台规范化推荐区域...";
        renderAreas(visibleChoices({ ignoreAreaFilter: true }));
        runSilentJob("/api/areas/start", {
          city: data.city || "",
          origin_city: data.origin_city || "",
          choices: data.choices || [],
          area_recommendations: data.area_recommendations || [],
        }, "区域规范化失败").then((areaData) => {
          if (token !== areaRefreshToken) return;
          mergeChoiceUpdates(areaData.choices || [], ["area_name", "area_source", "area_hint", "latitude", "longitude"]);
          lastServerAreas = areaData.area_recommendations || lastServerAreas;
          const refresh = areaData.area_refresh || {};
          lastAreaRefreshMeta = refresh.source === "geonames"
            ? "区域已用 GeoNames 和本地规则规范化"
            : "区域已按中文片区规则规范化";
          renderChoices();
        }).catch(() => {
          if (token !== areaRefreshToken) return;
          lastAreaRefreshMeta = "";
          renderAreas(visibleChoices({ ignoreAreaFilter: true }));
        });
      }

      function startHotelNameRefresh(data) {
        if (!data || !(data.choices || []).length) return;
        const token = ++hotelNameRefreshToken;
        lastHotelNameMeta = "正在匹配简体中文酒店名...";
        renderChoices();
        runSilentJob("/api/hotel-names/start", {
          city: data.city || "",
          origin_city: data.origin_city || "",
          choices: data.choices || [],
        }, "酒店名刷新失败", 180000).then((nameData) => {
          if (token !== hotelNameRefreshToken) return;
          mergeChoiceUpdates(nameData.choices || [], [
            "hotel_name",
            "hotel_original_name",
            "hotel_name_source",
            "hotel_name_simplified",
            "hotel_name_aliases",
            "hotel_search_name",
          ]);
          lastHotelNameMeta = "酒店名已更新为可匹配到的简体中文";
          renderChoices();
        }).catch(() => {
          if (token !== hotelNameRefreshToken) return;
          lastHotelNameMeta = "";
          renderChoices();
        });
      }

      function renderProgressEvents(events) {
        const items = (events || []).slice(-8);
        if (!items.length) return;
        progressMeta.textContent = `${items.length} 条`;
        progressList.innerHTML = items.map((event) => {
          const percent = Number(event.percent || 0);
          const progressText = percent ? `（${percent}%）` : "";
          return `<div class="progress-item"><span>${esc(event.message)}${esc(progressText)}</span></div>`;
        }).join("");
        progressPanel.classList.remove("hidden");
      }

      function formatDuration(seconds) {
        const mm = Math.floor(seconds / 60);
        const ss = String(seconds % 60).padStart(2, "0");
        return mm ? `${mm}分${ss}秒` : `${ss}秒`;
      }

      function formatAge(seconds) {
        const value = Number(seconds || 0);
        if (value < 60) return "刚刚";
        if (value < 3600) return `${Math.floor(value / 60)}分钟前`;
        return `${Math.floor(value / 3600)}小时前`;
      }

      function formatCacheInfo(cache) {
        if (!cache) return "";
        if (cache.summary_label) return cache.summary_label;
        if (cache.hit) {
          return `缓存命中：${cache.source_label || "缓存"} ${formatAge(cache.age_seconds)}`;
        }
        return "实时查询";
      }

      function areaCardKey(area) {
        return areaFilterKey(
          simplifyChineseText(area.area_name || ""),
          simplifyChineseText(area.recommend_city || "")
        );
      }

      function mergeAreaLists(primaryAreas, fallbackAreas) {
        const merged = [];
        const seen = new Set();
        for (const area of [...(primaryAreas || []), ...(fallbackAreas || [])]) {
          const areaName = simplifyChineseText(area.area_name || "");
          if (!areaName || isGenericAreaName(areaName)) continue;
          const recommendCity = simplifyChineseText(area.recommend_city || "");
          const key = areaFilterKey(areaName, recommendCity);
          if (seen.has(key)) continue;
          seen.add(key);
          merged.push({ ...area, area_name: areaName, recommend_city: recommendCity });
        }
        return merged;
      }

      function displayAreasForState(areas) {
        if (areaListExpanded || areas.length <= AREA_COLLAPSED_LIMIT) {
          return { visibleAreas: areas, hiddenCount: 0, showToggle: areas.length > AREA_COLLAPSED_LIMIT };
        }
        const visible = areas.slice(0, AREA_COLLAPSED_LIMIT);
        if (activeAreaFilter && !visible.some((area) => areaCardKey(area) === activeAreaFilter.key)) {
          const activeArea = areas.find((area) => areaCardKey(area) === activeAreaFilter.key);
          if (activeArea) {
            const activeKey = areaCardKey(activeArea);
            const rest = visible.filter((area) => areaCardKey(area) !== activeKey).slice(0, AREA_COLLAPSED_LIMIT - 1);
            return {
              visibleAreas: [activeArea, ...rest],
              hiddenCount: Math.max(0, areas.length - AREA_COLLAPSED_LIMIT),
              showToggle: true,
            };
          }
        }
        return {
          visibleAreas: visible,
          hiddenCount: areas.length - visible.length,
          showToggle: true,
        };
      }

      function renderAreas(items) {
        const builtAreas = buildAreasFromChoices(items);
        const areas = activeView === "all" && !resultSearchQuery && lastServerAreas.length
          ? mergeAreaLists(lastServerAreas, builtAreas)
          : builtAreas;
        const { visibleAreas, hiddenCount, showToggle } = displayAreasForState(areas);
        areaMeta.textContent = activeAreaFilter
          ? `已筛选 ${activeAreaFilter.label}，再次点击该片区可取消`
          : (lastAreaRefreshMeta || (areas.length
            ? (areaListExpanded && areas.length > AREA_COLLAPSED_LIMIT
              ? `已显示全部 ${areas.length} 个片区`
              : (hiddenCount ? `显示 ${visibleAreas.length}/${areas.length} 个片区，点击省略号查看全部` : `优先显示命中酒店更集中、降价更多的片区`))
            : "暂无可推荐片区"));
        if (!areas.length) {
          areaRecommendations.innerHTML = `<div class="empty">当前条件下暂无推荐旅游区域。</div>`;
          return;
        }
        const areaCards = visibleAreas.map((area) => {
            const areaName = simplifyChineseText(area.area_name || "");
            const recommendCity = simplifyChineseText(area.recommend_city || "");
            const reason = simplifyChineseText(area.reason || "");
            const representativeHotels = (area.representative_hotels || []).map((name) => simplifyChineseText(name));
            const key = areaFilterKey(areaName, recommendCity);
            const active = activeAreaFilter && key === activeAreaFilter.key;
            const cityLabel = recommendCity ? `${recommendCity} · ` : "";
            return `
            <article class="area-card${active ? " active" : ""}" role="button" tabindex="0" data-area-key="${esc(key)}" data-area-name="${esc(areaName)}" data-recommend-city="${esc(recommendCity)}" aria-pressed="${active ? "true" : "false"}" title="查看该片区酒店">
              <div class="area-name">${esc(areaName)}</div>
              <div class="area-stats">
                ${recommendCity ? `<span class="pill">${esc(recommendCity)}</span>` : ""}
                <span class="pill">${esc(area.hotel_count)} 家酒店</span>
                <span class="pill">${esc(area.lower_price_hotel_count)} 家更低</span>
                <span class="pill">${esc(area.average_holiday_nightly_tax_total_price)}/晚</span>
                <span class="diff ${diffClass(area.average_price_diff_nightly)}">${esc(area.average_price_diff_nightly_text)}</span>
              </div>
              <div class="area-hotels">${esc(reason)}</div>
              <div class="area-hotels">${esc(cityLabel)}${esc(representativeHotels.slice(0, 3).join("、"))}</div>
            </article>
          `;
          });
        if (showToggle) {
          const toggleText = areaListExpanded ? "收起片区" : `还有 ${hiddenCount} 个片区`;
          const toggleTitle = areaListExpanded ? "收起推荐片区" : "查看全部推荐片区";
          areaCards.push(`
            <article class="area-card area-more-card" role="button" tabindex="0" data-area-toggle="more" aria-expanded="${areaListExpanded ? "true" : "false"}" title="${esc(toggleTitle)}">
              <div class="area-more-dots">...</div>
              <div class="area-more-text">${esc(toggleText)}</div>
            </article>
          `);
        }
        areaRecommendations.innerHTML = areaCards.join("");
      }

      function buildAreasFromChoices(items) {
        const groups = new Map();
        for (const item of items) {
          const name = item.area_name || "";
          if (!name || isGenericAreaName(name)) continue;
          const areaName = simplifyChineseText(name);
          const recommendCity = simplifyChineseText(item.recommend_city || "");
          const key = areaFilterKey(areaName, recommendCity);
          if (!groups.has(key)) {
            groups.set(key, {
              area_name: areaName,
              recommend_city: recommendCity,
              hotel_count: 0,
              lower_price_hotel_count: 0,
              slightly_higher_hotel_count: 0,
              holiday_values: [],
              diff_values: [],
              representative_hotels: [],
            });
          }
          const group = groups.get(key);
          const diff = Number(item.price_diff_nightly || 0);
          group.hotel_count += 1;
          if (diff <= 0) group.lower_price_hotel_count += 1;
          else group.slightly_higher_hotel_count += 1;
          group.holiday_values.push(Number(item.holiday_avg_nightly_tax_total_value || 0));
          group.diff_values.push(diff);
          if (group.representative_hotels.length < 4) {
            group.representative_hotels.push(item.hotel_name || item.hotel_original_name || "");
          }
        }
        let areas = Array.from(groups.values()).map((group) => {
          const avgHoliday = Math.round(group.holiday_values.reduce((sum, value) => sum + value, 0) / Math.max(1, group.holiday_values.length));
          const avgDiff = Math.round(group.diff_values.reduce((sum, value) => sum + value, 0) / Math.max(1, group.diff_values.length));
          return {
            ...group,
            lower_price_ratio: group.lower_price_hotel_count / Math.max(1, group.hotel_count),
            average_holiday_nightly_tax_total_value: avgHoliday,
            average_holiday_nightly_tax_total_price: `CNY ${avgHoliday}`,
            average_price_diff_nightly: avgDiff,
            average_price_diff_nightly_text: avgDiff > 0 ? `+CNY ${avgDiff}` : `CNY ${avgDiff}`,
            reason: areaReason(group.hotel_count, group.lower_price_hotel_count, avgDiff),
          };
        });
        return areas.sort((a, b) =>
          (b.lower_price_ratio - a.lower_price_ratio) ||
          (b.lower_price_hotel_count - a.lower_price_hotel_count) ||
          (b.hotel_count - a.hotel_count) ||
          (a.average_price_diff_nightly - b.average_price_diff_nightly) ||
          (a.average_holiday_nightly_tax_total_value - b.average_holiday_nightly_tax_total_value)
        );
      }

      function isGenericAreaName(name) {
        return String(name || "").includes("热门酒店片区") || String(name || "").includes("区域待确认");
      }

      function areaReason(hotelCount, lowerCount) {
        if (lowerCount === hotelCount) return `${hotelCount} 家命中酒店假期价格不高于平日代表均价。`;
        if (lowerCount) return `${lowerCount} 家酒店假期更低，整体涨幅可控。`;
        return `${hotelCount} 家酒店假期涨幅不超过 100 元/晚。`;
      }

      function selectAreaCard(card) {
        const areaName = card.dataset.areaName || "";
        const recommendCity = card.dataset.recommendCity || "";
        const key = card.dataset.areaKey || areaFilterKey(areaName, recommendCity);
        if (activeAreaFilter && activeAreaFilter.key === key) {
          activeAreaFilter = null;
        } else {
          activeAreaFilter = {
            key,
            area: normalizeSearchText(areaName),
            city: normalizeSearchText(recommendCity),
            label: recommendCity ? `${recommendCity} · ${areaName}` : areaName,
          };
        }
        renderChoices();
        choicesBody.closest(".panel")?.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      async function readJsonResponse(resp, fallbackMessage) {
        const contentType = resp.headers.get("content-type") || "";
        const text = await resp.text();
        const trimmed = text.trim();
        const looksJson = contentType.includes("application/json") || trimmed.startsWith("{") || trimmed.startsWith("[");
        let data = null;
        if (looksJson) {
          try {
            data = trimmed ? JSON.parse(trimmed) : {};
          } catch (error) {
            throw new Error(`${fallbackMessage}：服务返回格式异常，请稍后重试。`);
          }
        } else {
          if ([502, 503, 504, 522, 524].includes(resp.status)) {
            throw new Error(`${fallbackMessage}：查询时间较长，公网隧道返回超时，请稍后重试或缩小条件。`);
          }
          const plain = trimmed.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").slice(0, 120);
          throw new Error(`${fallbackMessage}：服务返回异常${resp.status ? `（${resp.status}）` : ""}${plain ? `，${plain}` : ""}`);
        }
        if (!resp.ok) {
          throw new Error(data.error || `${fallbackMessage}（${resp.status}）`);
        }
        return data;
      }

      function sleep(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      function partialResultKey(partial, data) {
        const choices = partial.choices || [];
        const identity = choices
          .slice(0, 12)
          .map((item) => `${item.hotel_id || ""}:${item.room_type || ""}:${item.price_diff_nightly || ""}`)
          .join("|");
        return [
          partial.partial?.stage || data.progress?.stage || "",
          partial.partial?.total_choice_count || "",
          partial.partial?.displayed_choice_count || "",
          partial.partial?.scanned_hotel_limit || "",
          choices.length,
          (partial.city_results || []).length,
          partial.cache?.summary_label || "",
          identity,
        ].join(":");
      }

      async function runAsyncJob(startUrl, payload, fallbackMessage, options = {}) {
        let partialKey = "";
        const startResp = await fetch(startUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const startData = await readJsonResponse(startResp, fallbackMessage);
        if (startData.progress_events) {
          renderProgressEvents(startData.progress_events);
        }
        if (startData.progress && startData.progress.message) {
          const percent = Number(startData.progress.percent || 0);
          lastProgressMessage = percent ? `${startData.progress.message}（${percent}%）` : startData.progress.message;
          statusText.textContent = lastProgressMessage;
        }
        if (startData.status === "succeeded" && startData.result) {
          return startData.result;
        }
        if (startData.partial_result && typeof options.onProgress === "function") {
          partialKey = partialResultKey(startData.partial_result, startData);
          options.onProgress(startData.partial_result, startData);
        }
        const pollUrl = startData.poll_url || `/api/jobs/${startData.job_id}`;
        let pollInterval = Number(startData.poll_interval_ms || 2000);
        if (!pollUrl || !startData.job_id) {
          throw new Error(`${fallbackMessage}：查询任务创建失败。`);
        }

        const maxWaitMs = 30 * 60 * 1000;
        const started = Date.now();
        while (Date.now() - started < maxWaitMs) {
          await sleep(pollInterval);
          const resp = await fetch(pollUrl, { cache: "no-store" });
          const data = await readJsonResponse(resp, fallbackMessage);
          if (data.progress && data.progress.message) {
            const percent = Number(data.progress.percent || 0);
            lastProgressMessage = percent ? `${data.progress.message}（${percent}%）` : data.progress.message;
            statusText.textContent = lastProgressMessage;
          }
          if (data.progress_events) {
            renderProgressEvents(data.progress_events);
          }
          if (data.partial_result && typeof options.onProgress === "function") {
            const partial = data.partial_result;
            const key = partialResultKey(partial, data);
            if (key !== partialKey) {
              partialKey = key;
              options.onProgress(partial, data);
            }
          }
          if (data.status === "succeeded") {
            return data.result;
          }
          if (data.status === "failed") {
            throw new Error(data.error || fallbackMessage);
          }
          pollInterval = Math.min(5000, Math.max(1500, pollInterval));
        }
        throw new Error(`${fallbackMessage}：查询超过 30 分钟仍未完成，请稍后重试。`);
      }

      async function runSilentJob(startUrl, payload, fallbackMessage, maxWaitMs = 180000) {
        const startResp = await fetch(startUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const startData = await readJsonResponse(startResp, fallbackMessage);
        if (startData.status === "succeeded" && startData.result) {
          return startData.result;
        }
        const pollUrl = startData.poll_url || `/api/jobs/${startData.job_id}`;
        const started = Date.now();
        while (Date.now() - started < maxWaitMs) {
          await sleep(1800);
          const resp = await fetch(pollUrl, { cache: "no-store" });
          const data = await readJsonResponse(resp, fallbackMessage);
          if (data.status === "succeeded") return data.result;
          if (data.status === "failed") throw new Error(data.error || fallbackMessage);
        }
        throw new Error(`${fallbackMessage}：后台任务暂未完成。`);
      }

      geoBtn.addEventListener("click", () => {

      initOriginCitySelector();

      loadHolidays().catch((error) => {
        errorBox.textContent = error.message || "假期列表加载失败";
        errorBox.classList.remove("hidden");
      });

      priceButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const [min, max] = button.dataset.priceRange.split("-");
          form.elements.min_price.value = min || "";
          form.elements.max_price.value = max || "";
          priceButtons.forEach((item) => item.classList.toggle("active", item === button));
        });
      });

      viewFilter.addEventListener("click", (event) => {
        const button = event.target.closest("[data-view]");
        if (!button) return;
        activeView = button.dataset.view;
        viewFilter.querySelectorAll("[data-view]").forEach((item) => {
          item.classList.toggle("active", item === button);
        });
        renderChoices();
      });

      areaRecommendations.addEventListener("click", (event) => {
        const toggle = event.target.closest("[data-area-toggle]");
        if (toggle) {
          areaListExpanded = !areaListExpanded;
          renderChoices();
          return;
        }
        const card = event.target.closest(".area-card");
        if (!card) return;
        selectAreaCard(card);
      });

      areaRecommendations.addEventListener("keydown", (event) => {
        if (!["Enter", " "].includes(event.key)) return;
        event.preventDefault();
        const toggle = event.target.closest("[data-area-toggle]");
        if (toggle) {
          areaListExpanded = !areaListExpanded;
          renderChoices();
          return;
        }
        const card = event.target.closest(".area-card");
        if (!card) return;
        selectAreaCard(card);
      });

      resultSearchInput.addEventListener("input", () => {
        resultSearchQuery = normalizeSearchText(resultSearchInput.value);
        renderChoices();
      });
    </script>
  </body>
</html>
